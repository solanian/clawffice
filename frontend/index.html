<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawffice🦞</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v={{VERSION_TIMESTAMP}}">
    <link rel="preload" href="/static/fonts/ark-pixel-12px-proportional-latin.ttf.woff2?v={{VERSION_TIMESTAMP}}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/static/fonts/ark-pixel-12px-proportional-ko.ttf.woff2?v={{VERSION_TIMESTAMP}}" as="font" type="font/woff2" crossorigin>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/static/fonts/ark-pixel-12px-proportional-latin.ttf.woff2?v={{VERSION_TIMESTAMP}}') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: block;
            unicode-range: U+0000-00FF, U+0100-024F, U+2000-206F, U+20A0-20CF;
        }
        @font-face {
            font-family: 'ArkPixel';
            src: url('/static/fonts/ark-pixel-12px-proportional-ko.ttf.woff2?v={{VERSION_TIMESTAMP}}') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: block;
            unicode-range: U+1100-11FF, U+3130-318F, U+AC00-D7AF, U+A960-A97F, U+D7B0-D7FF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 0;
            gap: 0;
            overflow: hidden;
        }
        .office-tabs {
            width: 100vw;
            max-width: 100vw;
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: flex-start;
            background: #101421;
            border: 2px solid #263047;
            border-left: 0;
            border-right: 0;
            padding: 6px 20px;
            box-sizing: border-box;
        }
        .office-tab-btn {
            min-width: 110px;
            height: 34px;
            padding: 0 14px;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 14px;
            border: 2px solid #334155;
            background: #171d2d;
            color: #cbd5e1;
            cursor: pointer;
            border-radius: 4px;
        }
        .office-tab-btn.active {
            background: #ffd166;
            border-color: #f59e0b;
            color: #22170a;
        }
        .tab-view[hidden] {
            display: none !important;
        }
        #agents-view {
            width: 100vw;
            max-width: 100vw;
            flex: 1 1 auto;
            min-height: 0;
            box-sizing: border-box;
            border: 4px solid #0e1119;
            border-left: 0;
            border-right: 0;
            background: #101421;
            padding: 16px;
            overflow-y: auto;
        }
        .agents-add-btn {
            width: 100%;
            min-height: 70px;
            margin-top: 10px;
            border: 2px dashed #475569;
            background: #171d2d;
            color: #ffd166;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 28px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .agents-add-btn:hover {
            border-color: #ffd166;
            background: #263047;
        }
        .agents-card-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
            max-width: none;
        }
        .agent-card {
            min-height: 96px;
            display: grid;
            grid-template-columns: 76px 1fr;
            gap: 14px;
            align-items: center;
            padding: 12px;
            background: #171d2d;
            border: 2px solid #263047;
            border-radius: 6px;
        }
        .agent-card-main {
            border-color: #f59e0b;
        }
        .agent-avatar {
            width: 68px;
            height: 68px;
            border: 2px solid #334155;
            background-color: #0b1020;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            image-rendering: pixelated;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd166;
            font-size: 24px;
            overflow: hidden;
        }
        .agent-avatar-main {
            background-image: url('/static/star-idle-v5.png?v={{VERSION_TIMESTAMP}}');
            background-size: 800% 600%;
            background-position: 0 0;
        }
        .agent-name {
            color: #f8fafc;
            font-size: 17px;
            line-height: 1.25;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .agent-name-row,
        .guest-agent-name-row {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
        }
        .agent-unread-dot {
            width: 10px;
            height: 10px;
            flex: 0 0 auto;
            border-radius: 50%;
            background: #facc15;
            border: 1px solid #fff7ad;
            box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.18);
        }
        .agent-info {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            color: #cbd5e1;
            font-size: 12px;
            line-height: 1.4;
        }
        .agent-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .agent-action-btn {
            height: 30px;
            padding: 0 10px;
            border: 1px solid #475569;
            background: #111827;
            color: #f8fafc;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 13px;
        }
        .agent-action-btn:hover {
            border-color: #ffd166;
            background: #263047;
        }
        .agent-pill {
            border: 1px solid #334155;
            background: #0f172a;
            color: #cbd5e1;
            padding: 3px 7px;
            border-radius: 4px;
        }
        .agent-detail {
            flex-basis: 100%;
            color: #94a3b8;
            word-break: break-word;
        }
        .agents-empty {
            color: #94a3b8;
            padding: 28px 0;
            text-align: center;
            font-size: 13px;
        }
        .agent-info-modal {
            position: fixed;
            inset: 0;
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(4, 7, 15, 0.72);
        }
        .agent-info-modal[hidden] {
            display: none !important;
        }
        .agent-info-panel {
            width: min(760px, 100%);
            max-height: min(760px, calc(100vh - 32px));
            overflow-y: auto;
            background: #101421;
            border: 2px solid #334155;
            border-radius: 6px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.45);
            padding: 14px;
        }
        .agent-info-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .agent-info-title {
            min-width: 0;
            color: #ffd166;
            font-size: 17px;
            line-height: 1.25;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .agent-info-close {
            width: 30px;
            height: 30px;
            border: 1px solid #475569;
            background: #111827;
            color: #f8fafc;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 18px;
        }
        .agent-info-layout {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 14px;
            align-items: start;
        }
        .agent-info-profile {
            display: grid;
            gap: 8px;
            justify-items: center;
        }
        .agent-info-avatar {
            width: 128px;
            height: 128px;
            border: 2px solid #334155;
            background: #0b1020;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            border-radius: 8px;
            overflow: hidden;
            image-rendering: pixelated;
        }
        .agent-info-avatar-main {
            background-image: url('/static/star-idle-v5.png?v={{VERSION_TIMESTAMP}}');
            background-size: 800% 600%;
            background-position: 0 0;
        }
        .agent-info-avatar-guest img {
            width: 400%;
            height: 200%;
            max-width: none;
            object-fit: fill;
            image-rendering: pixelated;
        }
        .agent-info-profile-meta {
            width: 100%;
            display: grid;
            gap: 5px;
            color: #94a3b8;
            font-size: 11px;
            line-height: 1.35;
            word-break: break-word;
        }
        .agent-info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }
        .agent-info-item {
            min-width: 0;
            padding: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            border-radius: 5px;
        }
        .agent-info-label {
            color: #94a3b8;
            font-size: 11px;
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .agent-info-value {
            color: #f8fafc;
            font-size: 13px;
            line-height: 1.35;
            word-break: break-word;
        }
        .agent-info-status {
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.45;
        }
        .agent-info-status.error {
            color: #fca5a5;
        }
        .agent-info-control {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .agent-info-control select {
            min-width: 0;
            flex: 1 1 auto;
            height: 30px;
            border: 1px solid #475569;
            background: #0b1020;
            color: #f8fafc;
            border-radius: 4px;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 12px;
        }
        .agent-info-control button {
            height: 30px;
            padding: 0 9px;
            border: 1px solid #475569;
            background: #111827;
            color: #f8fafc;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 12px;
        }
        .agent-info-control button:hover {
            border-color: #ffd166;
            background: #263047;
        }
        .agent-info-control button.danger {
            border-color: #7f1d1d;
            color: #fecaca;
        }
        .agent-info-control button.danger:hover {
            border-color: #f87171;
            background: #3f1d24;
        }
        .agent-info-context-line {
            margin-bottom: 7px;
        }
        .remote-agent-modal {
            position: fixed;
            inset: 0;
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(4, 7, 15, 0.72);
        }
        .remote-agent-modal[hidden] {
            display: none !important;
        }
        .remote-agent-panel {
            width: min(720px, 100%);
            max-height: min(760px, calc(100vh - 32px));
            overflow-y: auto;
            background: #101421;
            border: 2px solid #334155;
            border-radius: 6px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.45);
            padding: 14px;
        }
        .remote-agent-header {
            position: relative;
            display: grid;
            justify-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-top: 2px;
        }
        .remote-agent-heading {
            width: 100%;
            display: grid;
            justify-items: center;
            gap: 10px;
            min-width: 0;
        }
        .remote-agent-title {
            color: #ffd166;
            font-size: 17px;
            line-height: 1.25;
            text-align: center;
        }
        .remote-agent-close {
            position: absolute;
            top: 0;
            right: 0;
            width: 30px;
            height: 30px;
            border: 1px solid #475569;
            background: #111827;
            color: #f8fafc;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 18px;
        }
        .remote-agent-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .remote-agent-field {
            display: grid;
            gap: 5px;
            color: #cbd5e1;
            font-size: 12px;
        }
        .remote-agent-field-full {
            grid-column: 1 / -1;
        }
        .remote-agent-field input {
            width: 100%;
            min-width: 0;
            height: 34px;
            padding: 0 9px;
            border: 1px solid #475569;
            background: #0b1020;
            color: #f8fafc;
            border-radius: 4px;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 13px;
        }
        .remote-agent-help {
            color: #94a3b8;
            font-size: 11px;
            line-height: 1.45;
        }
        .remote-avatar-profile-btn {
            width: 112px;
            height: 112px;
            flex: 0 0 auto;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 0;
            border: 2px solid #334155;
            background: #0b1020;
            border-radius: 8px;
            cursor: pointer;
            overflow: hidden;
        }
        .remote-avatar-profile-btn:hover,
        .remote-avatar-profile-btn:focus-visible {
            border-color: #ffd166;
            outline: none;
        }
        .remote-avatar-profile-btn img {
            width: 400%;
            height: 200%;
            max-width: none;
            object-fit: fill;
            image-rendering: pixelated;
        }
        .remote-avatar-dialog {
            position: fixed;
            inset: 0;
            z-index: 9100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(4, 7, 15, 0.62);
        }
        .remote-avatar-dialog[hidden] {
            display: none !important;
        }
        .remote-avatar-panel {
            width: min(420px, 100%);
            background: #101421;
            border: 2px solid #334155;
            border-radius: 6px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.45);
            padding: 12px;
        }
        .remote-avatar-dialog-header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .remote-avatar-close {
            width: 30px;
            height: 30px;
            border: 1px solid #475569;
            background: #111827;
            color: #f8fafc;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 18px;
        }
        .remote-avatar-picker {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 8px;
        }
        .remote-avatar-option {
            min-width: 0;
        }
        .remote-avatar-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .remote-avatar-card {
            height: 74px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            border: 2px solid #334155;
            background: #0b1020;
            border-radius: 5px;
            cursor: pointer;
            overflow: hidden;
        }
        .remote-avatar-card img {
            width: 400%;
            height: 200%;
            max-width: none;
            object-fit: fill;
            image-rendering: pixelated;
        }
        .remote-avatar-option input:checked + .remote-avatar-card {
            border-color: #ffd166;
            background: #263047;
        }
        .remote-agent-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
        }
        .remote-agent-actions button {
            height: 32px;
            padding: 0 12px;
            border: 1px solid #475569;
            background: #111827;
            color: #f8fafc;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 13px;
        }
        .remote-agent-actions button[type="submit"] {
            border-color: #f59e0b;
            background: #ffd166;
            color: #22170a;
        }
        .remote-agent-status {
            min-height: 18px;
            margin-top: 10px;
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .remote-agent-status.error {
            color: #fca5a5;
        }
        .remote-agent-status.success {
            color: #86efac;
        }
        #main-stage {
            position: relative;
            width: 100vw;
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
            transition: transform .25s ease;
            will-change: transform;
        }
        body.drawer-open #main-stage {
            transform: none;
        }
        #bottom-panels {
            display: flex;
            gap: 20px;
            width: 100vw;
            max-width: 100vw;
            padding: 0 20px;
            box-sizing: border-box;
            justify-content: flex-start;
            margin-top: 20px;
        }
        #game-container {
            position: relative;
            border: 0;
            image-rendering: pixelated;
            width: 100vw;
            height: 100%;
            max-width: 100vw;
            max-height: 100%;
            aspect-ratio: auto;
            overflow: hidden;
            cursor: grab;
            touch-action: none;
        }
        #game-container:active {
            cursor: grabbing;
        }
        .character-menu {
            position: absolute;
            z-index: 6500;
            min-width: 96px;
            display: grid;
            gap: 4px;
            padding: 6px;
            background: #111827;
            border: 2px solid #334155;
            box-shadow: 0 10px 24px rgba(0,0,0,0.35);
            pointer-events: auto;
            user-select: none;
        }
        .character-menu[hidden] {
            display: none !important;
        }
        .character-menu-title {
            color: #ffd166;
            font-size: 13px;
            line-height: 1.25;
            padding: 2px 4px 6px;
            border-bottom: 1px solid #334155;
            word-break: break-word;
        }
        .character-menu button {
            height: 30px;
            padding: 0 10px;
            border: 1px solid #475569;
            background: #1f2937;
            color: #f8fafc;
            font-family: 'ArkPixel', 'Courier New', monospace;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            position: relative;
            z-index: 1;
            pointer-events: auto;
        }
        .character-menu button:hover {
            background: #334155;
            border-color: #ffd166;
        }
        #page-stack {
            position: fixed;
            inset: 0;
            z-index: 7000;
            background: #101421;
            color: #f8fafc;
            font-family: 'ArkPixel', 'Courier New', monospace;
        }
        #page-stack[hidden] {
            display: none !important;
        }
        .stack-page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }
        .stack-page[hidden] {
            display: none !important;
        }
        .chat-header {
            height: 52px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-bottom: 2px solid #263047;
            background: #151b2b;
        }
        .chat-back-btn {
            width: 38px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #334155;
            background: #0f172a;
            color: #f8fafc;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 18px;
            line-height: 1;
        }
        .chat-back-btn:hover {
            border-color: #ffd166;
            background: #1f2937;
        }
        .chat-title {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 16px;
            line-height: 1.2;
            color: #ffd166;
        }
        .chat-messages {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #0f1422;
        }
        .chat-empty,
        .chat-error {
            color: #94a3b8;
            text-align: center;
            padding: 28px 8px;
            font-size: 13px;
        }
        .chat-error {
            color: #fca5a5;
            align-self: flex-start;
            max-width: min(760px, 92%);
            text-align: left;
        }
        .chat-message {
            max-width: min(720px, 86%);
            display: grid;
            gap: 4px;
            padding: 9px 10px;
            border: 1px solid #334155;
            background: #172033;
            border-radius: 6px;
            align-self: flex-start;
        }
        .chat-message-user {
            align-self: flex-end;
            max-width: min(660px, 100%);
            background: #1f2a19;
            border-color: #556b2f;
        }
        .chat-user-line {
            align-self: flex-end;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 7px;
            max-width: min(720px, 92%);
        }
        .chat-user-line .chat-message-user {
            align-self: auto;
            min-width: 0;
        }
        .chat-message-system {
            align-self: center;
            max-width: min(680px, 92%);
            background: #1e293b;
            border-color: #475569;
        }
        .chat-status-text {
            align-self: center;
            max-width: min(680px, 92%);
            padding: 2px 8px;
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.45;
            text-align: center;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .chat-status-error {
            align-self: flex-start;
            max-width: min(760px, 92%);
            color: #f87171;
            text-align: left;
        }
        .chat-status-waiting {
            color: #cbd5e1;
        }
        .chat-message-meta {
            display: flex;
            gap: 8px;
            align-items: center;

        #lang-toggle-group,
        #lang-toggle-group button {
            position: relative;

        }
        .room-loading-inner {
            display: flex;

            align-items: center;
            gap: 10px;
            padding: 16px 20px;
            border-radius: 10px;

            font-family: 'ArkPixel', monospace;

            text-shadow: 0 2px 6px rgba(0,0,0,.45);
        }
        #room-loading-emoji {
            font-size: 52px;
            line-height: 1;
            min-height: 56px;
        }
        #room-loading-text {
            font-size: 20px;
            letter-spacing: 1px;
        }
        #control-buttons button { height: 52px; }
        #control-bar button {
            background: #3a3f4f;
            color: #fff;
            border: 2px solid #555;
            border-radius: 4px;
            padding: 8px 10px;
            cursor: pointer;
            font-family: 'ArkPixel', monospace;
            font-size: 12px;
            transition: all 0.2s;
        }
        #control-bar button:hover {
            background: #4a4f5f;
            border-color: #e94560;
        }
        /* Star 状态四按钮（不含装修）使用像素精灵皮肤 */
        #control-bar #btn-state-idle,
        #control-bar #btn-state-writing,
        #control-bar #btn-state-syncing,
        #control-bar #btn-state-error {
            background-image: url('/static/btn-state-sprite.png?v={{VERSION_TIMESTAMP}}');
            background-color: transparent !important;
            background-repeat: no-repeat;
            background-size: 300% 100%;
            background-position: 0 0;
            border: none;
            border-radius: 0;
            appearance: none;
            -webkit-appearance: none;
            image-rendering: pixelated;
            color: #5e6366;
            font-weight: 400;
            text-shadow: none;
            padding: 0 8px 9px;
            line-height: 1;
            transition: padding-top .08s ease, padding-bottom .08s ease, filter .12s ease;
        }
        #control-bar #btn-state-idle:hover,
        #control-bar #btn-state-writing:hover,
        #control-bar #btn-state-syncing:hover,
        #control-bar #btn-state-error:hover {
            background-color: transparent !important;
            filter: brightness(1.04);
        }
        #control-bar #btn-state-idle:active,
        #control-bar #btn-state-writing:active,
        #control-bar #btn-state-syncing:active,
        #control-bar #btn-state-error:active {
            background-position: 50% 0;
            padding-top: 5px;
            padding-bottom: 0;
            filter: brightness(0.97);
        }
        /* 装修房间按钮使用像素精灵皮肤 */
        #control-bar #btn-open-drawer {
            background-image: url('/static/btn-open-drawer-sprite.png?v={{VERSION_TIMESTAMP}}') !important;
            background-color: transparent !important;
            background-repeat: no-repeat !important;
            background-size: 300% 100% !important;
            background-position: 0 0 !important;
            border: none !important;
            border-radius: 0 !important;
            appearance: none;
            -webkit-appearance: none;
            image-rendering: pixelated;
            color: #5e6366 !important;
            font-weight: 400 !important;
            font-size: 15px !important;
            text-shadow: none !important;
            padding: 0 10px 10px !important;
            line-height: 1 !important;
            transition: padding-top .08s ease, padding-bottom .08s ease, filter .12s ease;
        }
        #control-bar #btn-open-drawer:hover {
            background-color: transparent !important;
            filter: brightness(1.04);
        }
        #control-bar #btn-open-drawer:active {
            background-position: 50% 0 !important;
            padding-top: 5px !important;
            padding-bottom: 5px !important;
            filter: brightness(0.97);
        }
        /* Guest Agent 名单面板（右下角） */
        #guest-agent-panel {
            position: relative;
            width: 390px;
            height: 300px;
            flex: 1 1 0;
            min-width: 0;
            background: #141722;
            padding: 10px 10px 12px;
            border-radius: 0;
            border: 4px solid #0e1119;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
        }
        #guest-agent-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f);
            background-repeat: no-repeat;
            background-size:
                calc(50% - 14px) 2px, calc(50% - 14px) 2px,
                2px calc(50% - 14px), 2px calc(50% - 14px),
                calc(50% - 14px) 2px, calc(50% - 14px) 2px,
                2px calc(50% - 14px), 2px calc(50% - 14px);
            background-position:
                9px 8px, calc(50% + 5px) 8px,
                8px 9px, calc(100% - 10px) 9px,
                9px calc(100% - 10px), calc(50% + 5px) calc(100% - 10px),
                8px calc(50% + 5px), calc(100% - 10px) calc(50% + 5px);
        }
        #guest-agent-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f);
            background-repeat: no-repeat;
            background-size:
                9px 4px, 4px 9px,
                9px 4px, 4px 9px,
                9px 4px, 4px 9px,
                9px 4px, 4px 9px;
            background-position:
                left top, left top,
                right top, right top,
                left bottom, left bottom,
                right bottom, right bottom;
        }
        #guest-agent-panel-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            padding: 6px 0 10px;
            border-bottom: 0;
            margin-bottom: 0;
        }
        #guest-agent-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        #guest-agent-list::-webkit-scrollbar { width: 6px; }
        #guest-agent-list::-webkit-scrollbar-track { background: #1a1a2e; }
        #guest-agent-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        .guest-agent-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: #3a3f4f;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #555;
        }
        .guest-agent-name {
            color: #fff;
            font-size: 14px;
            flex-shrink: 0;
        }
        .guest-agent-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .guest-agent-buttons button {
            padding: 6px 10px;
            border-radius: 4px;
            border: 2px solid #555;
            background: #4a4f5f;
            color: #fff;
            font-family: 'ArkPixel', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .guest-agent-buttons button:hover {
            background: #5a5f6f;
            border-color: #e94560;
        }
        .guest-agent-buttons button.leave-btn {
            background: #5a1818;
            border-color: #e94560;
        }
        .guest-agent-buttons button.leave-btn:hover {
            background: #6a2828;
        }
        /* Memo 区域 - 4:3 小正方形 */
        #memo-panel {
            position: relative;
            width: 460px;
            height: 300px;
            flex: 1 1 0;
            min-width: 0;
            background-image: url('/static/memo-bg.webp');
            background-size: cover;
            background-position: center;
            border: 4px solid #0e1119;
            border-radius: 0;
            padding: 14px 16px;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #memo-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f);
            background-repeat: no-repeat;
            background-size:
                calc(50% - 14px) 2px, calc(50% - 14px) 2px,
                2px calc(50% - 14px), 2px calc(50% - 14px),
                calc(50% - 14px) 2px, calc(50% - 14px) 2px,
                2px calc(50% - 14px), 2px calc(50% - 14px);
            background-position:
                9px 8px, calc(50% + 5px) 8px,
                8px 9px, calc(100% - 10px) 9px,
                9px calc(100% - 10px), calc(50% + 5px) calc(100% - 10px),
                8px calc(50% + 5px), calc(100% - 10px) calc(50% + 5px);
        }
        #memo-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f),
                linear-gradient(#1a1b2f, #1a1b2f), linear-gradient(#1a1b2f, #1a1b2f);
            background-repeat: no-repeat;
            background-size:
                9px 4px, 4px 9px,
                9px 4px, 4px 9px,
                9px 4px, 4px 9px,
                9px 4px, 4px 9px;
            background-position:
                left top, left top,
                right top, right top,
                left bottom, left bottom,
                right bottom, right bottom;
        }
        #memo-panel.no-bg {
            background-image: none !important;
            background-color: #111827;
        }
        #memo-title {
            color: #1a1b2f;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
            text-align: center;
            letter-spacing: 1px;
            flex-shrink: 0;
            position: relative;
            top: 15px;
        }
        #memo-date {
            color: #888;
            font-size: 10px;
            margin-bottom: 8px;
            text-align: right;
            flex-shrink: 0;
            position: relative;
            left: -40px; /* move date left by 40px */
            top: -10px;
        }
        #memo-content {
            color: #3b3b32;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
            position: relative;
            left: 100px; /* move content right by 100px */
            top: -10px;
        }
        #memo-content::-webkit-scrollbar {
            width: 6px;
        }
        #memo-content::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        #memo-content::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        #memo-placeholder {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }
        .memo-decoration {
            text-align: center;
            margin: 4px 0;
            color: #555;
            font-size: 10px;
            flex-shrink: 0;
        }

        /* 手机端专属适配（不影响桌面） */
        @media (max-width: 900px), (pointer: coarse) {
            html, body {
                height: 100%;
            }

            body {
                padding: 0;
                gap: 0;
                overflow: hidden;
                -webkit-overflow-scrolling: touch;
                align-items: stretch;
            }

            #game-container {
                width: 100vw;
                height: 100%;
                max-width: 100vw;
                max-height: 100%;
                border-width: 0;
                border-radius: 0;
                aspect-ratio: auto;
                flex: 1 1 auto;
                touch-action: none;
                overflow: hidden;
            }

            #main-stage {
                width: 100vw;
                min-width: 0;
                margin-left: 0 !important;
            }
            .office-tabs,
            #agents-view {
                width: 100vw;
                max-width: 100vw;
                border-left: 0;
                border-right: 0;
            }
            .office-tabs {
                padding: 6px 8px;
            }
            .office-tab-btn {
                flex: 1;
                min-width: 0;
                font-size: 13px;
            }
            #agents-view {
                min-height: 0;
                padding: 10px;
            }
            .agents-card-list {
                max-width: none;
            }
            .agent-info-layout,
            .agent-info-grid,
            .remote-agent-grid {
                grid-template-columns: 1fr;
            }
            .remote-avatar-picker {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
            .remote-avatar-profile-btn {
                width: 104px;
                height: 104px;
            }
            .agent-card {
                grid-template-columns: 64px 1fr;
                min-height: 82px;
                gap: 10px;
                padding: 10px;
            }
            .agent-avatar {
                width: 58px;
                height: 58px;
            }
            .agent-name {
                font-size: 15px;
                margin-bottom: 6px;
            }

            body.drawer-open #main-stage {
                margin-left: 0 !important;
            }

            #memo-panel,
            #control-bar,
            #guest-agent-panel {
                width: 100%;
                height: auto;
                min-height: 180px;
            }

            #memo-panel { min-height: 220px; }
            #control-bar { min-height: 210px; }
            #guest-agent-panel { min-height: 220px; }

            #memo-date {
                left: 0;
                text-align: left;
                margin-bottom: 6px;
            }
            #memo-content {
                left: 0;
                font-size: 13px;
                line-height: 1.7;
            }

            #control-bar-title,
            #guest-agent-panel-title,
            #memo-title {
                font-size: 14px;
            }

            #control-buttons button,
            #control-bar button,
            .guest-agent-buttons button {
                font-size: 12px;
                min-height: 44px;
            }
            #control-buttons {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 6px;
            }
            #control-buttons button {
                min-height: 40px;
                padding: 4px 2px;
                font-size: 11px;
            }

            .guest-agent-item {
                align-items: flex-start;
                gap: 10px;
                flex-direction: column;
            }
            .guest-agent-buttons {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            #status-text {
                bottom: 8px;
                left: 8px;
                max-width: 64vw;
                font-size: 12px;
                padding: 8px 12px;
            }

            #lang-btn-en,
            #lang-btn-jp,
            #lang-btn-cn {
                font-size: 12px !important;
                padding: 6px 8px !important;
            }

            body.drawer-open {
                overflow: hidden !important;
                position: fixed;
                width: 100%;
                touch-action: none;
            }

            #asset-drawer {
                width: 92vw;
                max-width: 92vw;
                height: 100vh;
                height: 100dvh;
            }
            #asset-drawer-body {
                padding: 8px;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
            }
            #asset-list {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .asset-item {
                grid-template-columns: 52px 1fr 36px;
                padding: 6px;
                gap: 6px;
            }
            .asset-thumb { width:52px; height:52px; }
            .asset-path { font-size: 11px; line-height: 1.3; }
            .asset-sub { font-size: 10px; }
            #asset-upload-panel {
                left: 8px;
                right: 8px;
                width: auto;
                max-width: none;
                bottom: 8px;
                padding: 8px;
            }
            .asset-upload-grid {
                gap: 6px;
            }
            #asset-upload-panel input {
                min-width: 0;
                flex: 1 1 42%;
            }
            #asset-upload-panel button {
                min-height: 36px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading-overlay">
        <div id="loading-text">사무실에 가구를 배치하는 중...</div>
        <div id="loading-progress-container">
            <div id="loading-progress-bar"></div>
        </div>
    </div>

    <nav class="office-tabs" role="tablist" aria-label="Clawffice🦞 views">
        <button id="tab-office" class="office-tab-btn active" type="button" role="tab" aria-selected="true" aria-controls="main-stage" onclick="switchOfficeTab('office')">office</button>
        <button id="tab-agents" class="office-tab-btn" type="button" role="tab" aria-selected="false" aria-controls="agents-view" onclick="switchOfficeTab('agents')">agents</button>
    </nav>

    <section id="agents-view" class="tab-view" role="tabpanel" aria-labelledby="tab-agents" hidden>
        <div id="agents-card-list" class="agents-card-list">
            <div class="agents-empty">agent 목록을 불러오는 중...</div>
        </div>
        <button id="remote-agent-add-btn" class="agents-add-btn" type="button" title="원격 agent 추가" aria-label="원격 agent 추가">+</button>
    </section>

    <div id="agent-info-modal" class="agent-info-modal" hidden>
        <div class="agent-info-panel" role="dialog" aria-modal="true" aria-labelledby="agent-info-title">
            <div class="agent-info-header">
                <div id="agent-info-title" class="agent-info-title">Agent</div>
                <button id="agent-info-close" class="agent-info-close" type="button" aria-label="닫기">×</button>
            </div>
            <div id="agent-info-content" class="agent-info-status">정보를 불러오는 중...</div>
        </div>
    </div>

    <div id="remote-agent-modal" class="remote-agent-modal" hidden>
        <form id="remote-agent-form" class="remote-agent-panel" autocomplete="off">
            <div class="remote-agent-header">
                <div class="remote-agent-heading">
                    <div class="remote-agent-title">Agent 추가</div>
                    <button id="remote-avatar-profile-btn" class="remote-avatar-profile-btn" type="button" aria-label="캐릭터 선택" title="캐릭터 선택">
                        <img id="remote-avatar-profile-img" src="/static/guest_role_1.png?v={{VERSION_TIMESTAMP}}" alt="선택된 캐릭터">
                    </button>
                </div>
                <button id="remote-agent-close" class="remote-agent-close" type="button" aria-label="닫기">×</button>
            </div>
            <div class="remote-agent-grid">
                <label class="remote-agent-field">
                    서버
                    <input name="host" required list="remote-agent-host-options" placeholder="example.com 또는 10.0.0.5">
                    <datalist id="remote-agent-host-options"></datalist>
                    <span class="remote-agent-help">직접 입력하거나 이전에 연결한 서버를 선택하세요.</span>
                </label>
                <label class="remote-agent-field">
                    SSH 사용자
                    <input name="sshUser" required placeholder="opc">
                </label>
                <label class="remote-agent-field">
                    SSH 포트
                    <input name="sshPort" inputmode="numeric" placeholder="22" value="22">
                </label>
                <label class="remote-agent-field">
                    agent 이름
                    <input name="agentName" required placeholder="Research Agent">
                </label>
                <label class="remote-agent-field">
                    OpenClaw agent id
                    <input name="openclawAgentId" required placeholder="research-agent">
                </label>
                <label class="remote-agent-field">
                    join key
                    <input name="joinKey" required placeholder="ocj_xxx">
                </label>
                <label class="remote-agent-field remote-agent-field-full">
                    office URL
                    <input name="officeUrl" required>
                    <span class="remote-agent-help">원격 agent가 이 Office UI로 접속할 전체 주소입니다. 포트가 있으면 포함하세요. 예: http://10.0.0.5:19000</span>
                </label>
                <label class="remote-agent-field remote-agent-field-full">
                    SSH key path (office 서버 기준)
                    <input name="sshKeyPath" placeholder="/home/opc/.ssh/id_rsa">
                </label>
                <label class="remote-agent-field remote-agent-field-full">
                    SSH password (선택, 저장하지 않음)
                    <input name="sshPassword" type="password" placeholder="sshpass 설치 시에만 사용 가능">
                </label>
                <div id="remote-avatar-dialog" class="remote-avatar-dialog" role="dialog" aria-modal="true" aria-label="캐릭터 선택" hidden>
                    <div class="remote-avatar-panel">
                        <div class="remote-avatar-dialog-header">
                            <button id="remote-avatar-close" class="remote-avatar-close" type="button" aria-label="닫기">×</button>
                        </div>
                        <div class="remote-avatar-picker" role="radiogroup" aria-label="캐릭터 선택">
                            <label class="remote-avatar-option"><input type="radio" name="avatar" value="guest_role_1" checked><span class="remote-avatar-card"><img src="/static/guest_role_1.png?v={{VERSION_TIMESTAMP}}" alt="캐릭터 1"></span></label>

            const loadingEl = document.getElementById('loading-text');

            const dict = I18N[uiLang] || {};
            const base = safePercent !== null && safePercent > 50
                ? (dict.loadingOfficeLate || '에이전트들이 출근하는 중...')
                : (dict.loadingOffice || '사무실에 가구를 배치하는 중...');
            const p = safePercent !== null ? ` ${safePercent}%` : '';
            loadingEl.textContent = `${base}${p}`;
        }

        let supportsWebP = false;
        
        // 方法 1: 使用 canvas 检测
        function checkWebPSupport() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                if (canvas.getContext && canvas.getContext('2d')) {
                    resolve(canvas.toDataURL('image/webp').indexOf('data:image/webp') === 0);
                } else {
                    resolve(false);
                }
            });
        }
        
        // 方法 2: 使用 image 检测（备用）
        function checkWebPSupportFallback() {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = 'data:image/webp;base64,UklGRkoAAABXRUJQVlA4WAoAAAAQAAAAAAAAAAAAQUxQSAwAAAABBxAR/Q9ERP8DAABWUDggGAAAADABAJ0BKgEAAQADADQlpAADcAD++/1QAA==';

        // Memo 相关函数
        async function loadMemo() {
            const memoDate = document.getElementById('memo-date');
            const memoContent = document.getElementById('memo-content');
            if (!memoDate || !memoContent) return;
            
            try {
                const response = await fetch('/yesterday-memo?t=' + Date.now(), { cache: 'no-store' });
                const data = await response.json();
                
                if (data.success && data.memo) {
                    memoDate.textContent = data.date || '';
                    memoContent.innerHTML = data.memo.replace(/\n/g, '<br>');
                } else {
                    memoContent.innerHTML = '<div id="memo-placeholder">어제 메모가 없습니다</div>';
                }
            } catch (e) {
                console.error('메모 로드 실패:', e);
                memoContent.innerHTML = '<div id="memo-placeholder">불러오지 못했습니다</div>';
            }
        }

            const clientX = Number(event && event.clientX);
            const clientY = Number(event && event.clientY);
            if (!Number.isFinite(clientX) || !Number.isFinite(clientY)) return false;

            const camera = game.cameras.main;

            const nativeEvent = pointer && pointer.event;
            const rect = container.getBoundingClientRect();
            let rawLeft;
            let rawTop;
            if (nativeEvent && Number.isFinite(nativeEvent.clientX) && Number.isFinite(nativeEvent.clientY)) {
                rawLeft = nativeEvent.clientX - rect.left + 12;
                rawTop = nativeEvent.clientY - rect.top - 8;
            } else {
                const zoom = Math.max(0.01, camera.zoom || 1);
                const spriteHeight = Math.max(48, Number(sprite.displayHeight || sprite.height || 80));
                const originY = Number.isFinite(sprite.originY) ? sprite.originY : 0.5;
                const worldX = Number(sprite.x || 0) + 26;

                rawLeft = ((worldX - camera.scrollX) * zoom) + 12;
                rawTop = ((worldY - camera.scrollY) * zoom) - 8;
            }
            const maxLeft = Math.max(8, container.clientWidth - menu.offsetWidth - 8);
            const maxTop = Math.max(8, container.clientHeight - menu.offsetHeight - 8);
            menu.style.left = `${Math.max(8, Math.min(maxLeft, Math.round(rawLeft)))}px`;

        function syncChatMessages(messages, options = {}) {

                return renderChatMessages(messages);

            if (!Array.isArray(messages) || messages.length === 0) {
                return renderChatMessages(messages);
            }
            const nextKeys = messages.map(chatMessageKey);
            let mismatchIndex = 0;
            while (
                mismatchIndex < chatRenderedMessageKeys.length
                && mismatchIndex < nextKeys.length
                && chatRenderedMessageKeys[mismatchIndex] === nextKeys[mismatchIndex]
            ) {
                mismatchIndex += 1;
            }
            if (mismatchIndex === chatRenderedMessageKeys.length) {
                appendChatMessages(messages, mismatchIndex);
                return hasChatWaitingMessages(messages);

            const rerenderFrom = Math.max(0, mismatchIndex - 1);
            chatRenderedMessageKeys.slice(rerenderFrom).forEach((key) => {
                const selector = `[data-chat-message-key="${CSS.escape(key)}"]`;

            appendChatMessages(messages, rerenderFrom);

                agentName: chat.agentName,
                limit: '200'
            });
            try {
                const response = await fetch('/chat/conversation?' + params.toString(), { cache: 'no-store' });
                const data = await response.json();
                if (!response.ok || !data.ok) throw new Error(data.msg || '대화를 불러오지 못했습니다');
                const messages = data.messages || [];
                const hasWaiting = hasChatWaitingMessages(messages);
                const queue = data.queue || [];
                const canPreserveWaitingRender = options.preservePendingRender
                    && hasWaiting
                    && hasRenderedChatWaitingStatus()
                    && chatMessageKeysMatch(messages);
                if (!canPreserveWaitingRender) {
                    syncChatMessages(messages, { replace: showLoading });
                }
                renderChatQueue(queue);
                await markActiveChatRead(messages);
                setChatConversationPending(!!data.pending || hasWaiting || queue.length > 0);
            } catch (e) {
                setChatConversationPending(false);
                renderChatError(e.message || String(e));
            }
        }

        function openAgentChatPage(agentId, agentName) {
            const normalizedAgentId = String(agentId || '').trim();
            const normalizedAgentName = String(agentName || normalizedAgentId || 'Agent').trim();
            if (!normalizedAgentId) {
                if (statusText) statusText.textContent = '대화할 agentId가 없습니다';
                return;
            }
            hideCharacterMenu();
            stopChatPendingPoll();
            stopChatWaitingStatus();
            chatConversationPending = false;
            chatSubmitInFlight = false;
            chatRenderedMessageKeys = [];
            renderChatQueue([]);
            activeChat = { agentId: normalizedAgentId, agentName: normalizedAgentName };
            const page = document.getElementById('chat-page');
            if (page) {
                page.dataset.agentId = normalizedAgentId;
                page.dataset.agentName = normalizedAgentName;
            }
            const title = document.getElementById('chat-title');
            if (title) title.textContent = normalizedAgentName;
            const input = document.getElementById('chat-input');

            updateChatComposerState();
            pushStackPage('chat-page', activeChat);
            loadChatConversation();
            setTimeout(() => input?.focus(), 0);

        function getActiveChatState() {
            if (activeChat?.agentId) return activeChat;
            const page = document.getElementById('chat-page');
            const agentId = String(page?.dataset?.agentId || '').trim();
            if (!agentId) return null;
            const agentName = String(page?.dataset?.agentName || agentId).trim();
            activeChat = { agentId, agentName };
            return activeChat;
        }

	        async function submitChatMessage(event) {
	            if (event && typeof event.preventDefault === 'function') event.preventDefault();
	            const chat = getActiveChatState();
	            if (!chat) {
	                if (statusText) statusText.textContent = '대화할 agentId가 없습니다';
	                return;
	            }
	            const input = document.getElementById('chat-input');
	            const button = document.getElementById('chat-send-btn');
	            const content = (input?.value || '').trim();
	            if (!content) return;
	            if (button?.disabled || chatSubmitInFlight) return;
	            const shouldQueue = chatConversationPending;

	            const box = document.getElementById('chat-messages');
	            if (input) input.value = '';
	            if (box && !shouldQueue) {
	                const now = new Date().toISOString();
	                const pending = [
	                    { role: 'user', content, createdAt: now },
	                    { role: 'system', content: formatChatWaitingText(0), createdAt: now }
	                ];
	                const hasOnlyEmpty = !!box.querySelector('.chat-empty');
	                if (hasOnlyEmpty) {
	                    renderChatMessages(pending);
	                } else {
	                    box.insertAdjacentHTML('beforeend', pending.map((message) => (
	                        renderChatMessage(message, { read: false })
	                    )).join(''));
	                    chatRenderedMessageKeys = chatRenderedMessageKeys.concat(pending.map(chatMessageKey));
	                    box.scrollTop = box.scrollHeight;
	                }
	            }
	            chatSubmitInFlight = true;
	            setChatConversationPending(true);
	            try {
	                const response = await fetch('/chat/messages', {
	                    method: 'POST',
	                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agentId: chat.agentId,
                        agentName: chat.agentName,
                        role: 'user',
	                        content
	                    })
	                });
	                const data = await response.json();
	                if (!response.ok || !data.ok) throw new Error(data.msg || '메시지를 저장하지 못했습니다');
                    if (data.queued) {
                        renderChatQueue(data.queue || []);
                    }
	            } catch (e) {
	                await loadChatConversation({ showLoading: false });
	                if (statusText) statusText.textContent = e.message || String(e);
	            } finally {
	                chatSubmitInFlight = false;
	                updateChatComposerState();
	                input?.focus();
	            }
	        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            })[ch]);
        }

        function formatCompactNumber(value) {
            const n = Number(value);
            if (!Number.isFinite(n)) return '-';
            if (Math.abs(n) >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1) + 'm';
            if (Math.abs(n) >= 1000) return (n / 1000).toFixed(n >= 100000 ? 0 : 1) + 'k';
            return String(Math.round(n));
        }

        function formatRelativeAge(ms) {
            const n = Number(ms);
            if (!Number.isFinite(n) || n < 0) return '-';
            const sec = Math.round(n / 1000);
            if (sec < 60) return `${sec}s ago`;
            const min = Math.round(sec / 60);
            if (min < 60) return `${min}m ago`;
            const hr = Math.round(min / 60);
            if (hr < 48) return `${hr}h ago`;
            return `${Math.round(hr / 24)}d ago`;
        }

        function formatMaybeBool(value) {
            if (typeof value === 'boolean') return value ? 'ok' : 'off';
            return value ?? '-';
        }

        function agentInfoItem(label, value) {
            const text = value === undefined || value === null || value === '' ? '-' : value;
            return `<div class="agent-info-item"><div class="agent-info-label">${escapeHtml(label)}</div><div class="agent-info-value">${escapeHtml(text)}</div></div>`;
        }

        function agentInfoHtmlItem(label, html) {

        }

        function renderModelControl(agent, modelConfig = {}) {
            const models = Array.isArray(modelConfig.models) && modelConfig.models.length
                ? modelConfig.models
                : [modelConfig.effective].filter(Boolean);
            const selected = modelConfig.configured || modelConfig.effective || '';
            const options = models.map(model => `<option value="${escapeHtml(model)}" ${model === selected ? 'selected' : ''}>${escapeHtml(model)}</option>`).join('');
            const inherited = modelConfig.configured ? '' : `기본값 ${modelConfig.default || '-'}`;
            return `
                <div class="agent-info-control">
                    <select id="agent-info-model-select" aria-label="Model">${options}</select>
                    <button type="button" data-agent-info-save-model data-agent-id="${escapeHtml(agent.agentId || 'star')}">저장</button>
                </div>
                <div style="margin-top:5px;color:#94a3b8;font-size:11px;line-height:1.35;">${escapeHtml(inherited || 'agent별 설정')}</div>
            `;
        }

        function renderThinkingControl(agent, thinking = {}) {
            const levels = Array.isArray(thinking.levels) && thinking.levels.length
                ? thinking.levels
                : ['off', 'minimal', 'low', 'medium', 'high', 'xhigh', 'adaptive', 'max'];

        function renderAgentInfo(data) {
            const agent = data.agent || {};
            const oc = data.openclaw || {};
            const tokens = oc.tokens || {};
            const context = oc.context || {};
            const queue = oc.queue || {};
            const server = oc.server || {};
            const isMain = !!agent.isMain;
            const avatarHtml = isMain
                ? '<div class="agent-info-avatar agent-info-avatar-main" aria-hidden="true"></div>'
                : `<div class="agent-info-avatar agent-info-avatar-guest" aria-hidden="true"><img src="/static/guest_role_${getAgentAvatarIndex(agent)}.png?v={{VERSION_TIMESTAMP}}" alt=""></div>`;
            const modelConfig = oc.modelConfig || {};
            const model = modelConfig.effective || [oc.modelProvider, oc.model].filter(Boolean).join('/') || oc.model || '-';
            const cacheTotal = Number(tokens.cacheRead || 0) + Number(tokens.cacheWrite || 0);
            const cacheLine = cacheTotal ? `${formatCompactNumber(tokens.cacheRead || 0)} read · ${formatCompactNumber(tokens.cacheWrite || 0)} write` : '-';
            const contextLine = context.used || context.limit
                ? `${formatCompactNumber(context.used)} / ${formatCompactNumber(context.limit)}${context.percent !== undefined ? ` (${context.percent}%)` : ''}`
                : '-';
            const queueLine = `active ${queue.active ?? 0} · queued ${queue.queued ?? 0} · running ${queue.running ?? 0}${queue.failures ? ` · issues ${queue.failures}` : ''}`;
            const serverLine = server.host
                ? `${server.sshUser ? `${server.sshUser}@` : ''}${server.host}${server.sshPort ? `:${server.sshPort}` : ''}`
                : '-';
            const thinking = oc.thinking || {};
            const identity = [oc.identityEmoji, oc.identityName].filter(Boolean).join(' ') || '-';
            const errors = Array.isArray(oc.errors) && oc.errors.length
                ? agentInfoItem('OpenClaw 조회 경고', oc.errors.join(' / '))
                : '';

            return `
                <div class="agent-info-layout">
                    <div class="agent-info-profile">
                        ${avatarHtml}
                        <div class="agent-info-profile-meta">
                            <div>${escapeHtml(agent.openclawAgentId || '-')}</div>
                            <div>${escapeHtml(agent.state || '-')} · ${escapeHtml(agent.authStatus || '-')}</div>
                            <div>${escapeHtml(formatAgentUpdatedAt(agent.lastPushAt))}</div>
                        </div>
                    </div>
                    <div class="agent-info-grid">
                        ${agentInfoItem('OpenClaw', oc.version ? `OpenClaw ${oc.version}` : '-')}
                        ${agentInfoHtmlItem('Model', renderModelControl(agent, modelConfig))}
                        ${agentInfoItem('Auth', oc.auth || '-')}
                        ${agentInfoHtmlItem('Think level', renderThinkingControl(agent, thinking))}
                        ${agentInfoItem('Tokens', `${formatCompactNumber(tokens.input)} in / ${formatCompactNumber(tokens.output)} out · total ${formatCompactNumber(tokens.total)}`)}
                        ${agentInfoItem('Cache', cacheLine)}
                        ${agentInfoHtmlItem('Context', renderContextControl(agent, contextLine))}
                        ${agentInfoItem('Queue', queueLine)}
                        ${agentInfoItem('Identity', identity)}
                        ${agentInfoItem('Server', serverLine)}
                        ${agentInfoItem('Workspace', oc.workspace || '-')}
                        ${errors}
                    </div>
                </div>
            `;
        }

            const seen = new Set();
            return [...mainAgents, ...visitors].filter((agent) => {
                const id = agent.agentId || agent.name || JSON.stringify(agent);

                seen.add(id);
                return true;
            });

        function getAgentAvatarIndex(agent) {
            const avatar = String(agent.avatar || '');
            const match = avatar.match(/_(\d+)$/);
            if (match) {
                const n = parseInt(match[1], 10);
                if (n >= 1 && n <= 6) return n;
            }
            const seed = String(agent.agentId || agent.name || 'agent');
            let hash = 0;
            for (let i = 0; i < seed.length; i++) hash = (hash * 31 + seed.charCodeAt(i)) >>> 0;
            return (hash % 6) + 1;
        }

            const state = stateInfo?.name || data?.state || '상태';

            try {
                const d = new Date(value);
                if (Number.isNaN(d.getTime())) return String(value);
                return d.toLocaleString('ko-KR', { hour12: false });
            } catch (e) {
                return String(value);
            }
        }

        async function loadRemoteAgentHosts() {
            try {
                const response = await fetch('/remote-agent/hosts?t=' + Date.now(), { cache: 'no-store' });
                const data = await response.json();
                if (!response.ok || !data.ok || !Array.isArray(data.hosts)) return [];
                const datalist = document.getElementById('remote-agent-host-options');
                if (datalist) {
                    datalist.innerHTML = data.hosts.map((item) => (
                        `<option value="${escapeHtml(item.host)}" label="${escapeHtml([item.sshUser, item.sshPort].filter(Boolean).join(':'))}"></option>`
                    )).join('');
                }
                return data.hosts;
            } catch (e) {
                return [];
            }
        }

        function applyRemoteHostDefaults(hosts) {
            const form = document.getElementById('remote-agent-form');
            if (!form) return;
            const selected = (hosts || []).find(item => item.host === form.host?.value);
            if (!selected) return;
            if (selected.sshUser && form.sshUser && !form.sshUser.value) form.sshUser.value = selected.sshUser;
            if (selected.sshPort && form.sshPort && (!form.sshPort.value || form.sshPort.value === '22')) form.sshPort.value = selected.sshPort;
        }

        async function openRemoteAgentModal() {
            const modal = document.getElementById('remote-agent-modal');
            const form = document.getElementById('remote-agent-form');
            const status = document.getElementById('remote-agent-status');
            if (!modal || !form) return;
            if (form.officeUrl && !form.officeUrl.value) form.officeUrl.value = window.location.origin;
            if (status) {
                status.textContent = '';
                status.classList.remove('error', 'success');
            }
            updateRemoteAvatarProfile();
            const hosts = await loadRemoteAgentHosts();
            form.__remoteHosts = hosts;
            if (form.host && !form.__remoteHostBound) {
                form.host.addEventListener('change', () => applyRemoteHostDefaults(form.__remoteHosts || []));
                form.host.addEventListener('input', () => applyRemoteHostDefaults(form.__remoteHosts || []));
                form.__remoteHostBound = true;
            }
            modal.hidden = false;
            setTimeout(() => form.host?.focus(), 0);
        }

        function closeRemoteAgentModal() {
            const modal = document.getElementById('remote-agent-modal');
            const status = document.getElementById('remote-agent-status');
            closeRemoteAvatarDialog(false);
            if (modal) modal.hidden = true;
            if (status) status.classList.remove('error', 'success');
        }

        function setRemoteAgentStatus(message, kind) {
            const status = document.getElementById('remote-agent-status');
            if (!status) return;
            status.textContent = message || '';
            status.classList.toggle('error', kind === 'error');
            status.classList.toggle('success', kind === 'success');
        }

        function getSelectedRemoteAvatar() {
            const checked = document.querySelector('#remote-agent-form input[name="avatar"]:checked');
            return checked?.value || 'guest_role_1';
        }

        function updateRemoteAvatarProfile() {
            const img = document.getElementById('remote-avatar-profile-img');
            if (!img) return;
            const avatar = getSelectedRemoteAvatar();
            img.src = `/static/${avatar}.png?v={{VERSION_TIMESTAMP}}`;
        }

        function openRemoteAvatarDialog() {
            const dialog = document.getElementById('remote-avatar-dialog');
            if (!dialog) return;
            dialog.hidden = false;
            setTimeout(() => dialog.querySelector('input[name="avatar"]:checked')?.focus(), 0);
        }

        function closeRemoteAvatarDialog(restoreFocus = true) {
            const dialog = document.getElementById('remote-avatar-dialog');
            const profile = document.getElementById('remote-avatar-profile-btn');
            if (dialog) dialog.hidden = true;
            if (restoreFocus) profile?.focus();
        }

        function handleRemoteAvatarChange(event) {
            if (!event.target || event.target.name !== 'avatar') return;
            updateRemoteAvatarProfile();
            closeRemoteAvatarDialog();
        }

        async function submitRemoteAgentForm(event) {
            event.preventDefault();
            const form = event.currentTarget;
            const submitBtn = form.querySelector('button[type="submit"]');
            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());
            payload.remoteHost = payload.host || '';
            payload.remoteSshUser = payload.sshUser || '';
            payload.remoteSshPort = payload.sshPort || '';
            if (submitBtn?.disabled) return;
            setRemoteAgentStatus('원격 서버에 설치 명령을 보내는 중...', '');
            if (submitBtn) submitBtn.disabled = true;
            try {
                const response = await fetch('/remote-agent/install', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok || !data.ok) throw new Error(data.msg || `원격 설치 실패 (${response.status})`);
                setRemoteAgentStatus(`${data.msg || '원격 agent 푸시를 시작했습니다'}\n로그: ${data.logFile || '-'}`, 'success');
                await fetchGuestAgents();
            } catch (e) {
                setRemoteAgentStatus(e.message || String(e), 'error');
            } finally {
                if (submitBtn) submitBtn.disabled = false;
            }
        }

        function renderAgentsTabList() {
            const list = document.getElementById('agents-card-list');
            if (!list) return;
            const agents = getAgentTabItems();
            if (!agents.length) {
                list.innerHTML = '<div class="agents-empty">표시할 agent가 없습니다</div>';
                return;
            }

            const authMap = {
                approved: '승인됨',
                pending: '승인 대기',
                rejected: '거절됨',
                offline: '오프라인'
            };
            const stateMap = {
                idle: '대기',
                writing: '작업',
                researching: '조사',
                executing: '실행',
                syncing: '동기화',
                error: '오류'
            };

            list.innerHTML = agents.map((agent) => {
                const isMain = !!agent.isMain;
                const agentIdRaw = String(agent.agentId || (isMain ? 'star' : '')).trim();
                const nameRaw = agent.name || (isMain ? 'Star' : '이름 없는 agent');
                const name = escapeHtml(nameRaw);
                const agentId = escapeHtml(agentIdRaw);
                const state = escapeHtml(stateMap[agent.state] || agent.state || '대기');
                const auth = escapeHtml(authMap[agent.authStatus] || agent.authStatus || '승인됨');
                const area = escapeHtml(agent.area || '-');
                const source = escapeHtml(agent.source || (isMain ? 'local' : 'remote'));
                const updated = escapeHtml(formatAgentUpdatedAt(agent.lastPushAt || agent.updated_at));
                const detail = escapeHtml(agent.detail || '');
                const avatar = isMain
                    ? '<div class="agent-avatar agent-avatar-main" aria-hidden="true"></div>'
                    : `<div class="agent-avatar" aria-hidden="true" style="background-image:url('/static/guest_role_${getAgentAvatarIndex(agent)}.png?v={{VERSION_TIMESTAMP}}')"></div>`;
                const unreadDot = agent.hasUnread ? '<span class="agent-unread-dot" title="안 읽은 메시지" aria-label="안 읽은 메시지"></span>' : '';

                return `
                    <article class="agent-card ${isMain ? 'agent-card-main' : ''}">
                        ${avatar}
                        <div>
                            <div class="agent-name"><span class="agent-name-row"><span>${name}</span>${unreadDot}</span></div>
                            <div class="agent-info">
                                <span class="agent-pill">상태 ${state}</span>
                                <span class="agent-pill">${auth}</span>
                                <span class="agent-pill">영역 ${area}</span>
                                <span class="agent-pill">${source}</span>
                                <span class="agent-pill">${updated}</span>
                                ${detail ? `<div class="agent-detail">${detail}</div>` : ''}
                            </div>
                            <div class="agent-actions">
                                <button class="agent-action-btn" type="button" data-agent-action="chat" data-agent-id="${agentId}" data-agent-name="${name}">대화</button>
                                <button class="agent-action-btn" type="button" data-agent-action="info" data-agent-id="${agentId}" data-agent-name="${name}">정보</button>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // 状态控制栏函数（用于测试）
        function setState(state, detail) {
            fetch('/set_state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state, detail })
            })
            .then((res) => {
                if (!res.ok) throw new Error(`set_state failed: ${res.status}`);
                return fetchStatus();
            })
            .catch((e) => {
                console.error('setState failed', e);
            });
        }

        function updateAssetAuthUI() {
            const gate = document.getElementById('asset-auth-gate');
            const main = document.getElementById('asset-main-content');
            if (!gate || !main) return;
            gate.style.display = assetDrawerAuthed ? 'none' : 'block';
            main.style.display = assetDrawerAuthed ? 'block' : 'none';
            updateManualPanelUI();
        }

        function updateManualPanelUI() {
            const panel = document.getElementById('asset-manual-panel');
            if (!panel) return;
            panel.classList.toggle('open', !!assetManualPanelOpen && !!assetDrawerAuthed);
        }

        async function unlockAssetDrawer() {
            const input = document.getElementById('asset-pass-input');
            const msg = document.getElementById('asset-auth-msg');
            const val = (input?.value || '').trim();
            if (!val) {
                if (msg) msg.textContent = '❌ 인증코드를 입력해주세요';
                return;
            }
            try {
                const res = await fetch('/assets/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: val })
                });
                const data = await res.json();
                if (data && data.ok) {
                    assetDrawerAuthed = true;
                    if (msg) msg.textContent = '✅ 인증되었습니다';
                    updateAssetAuthUI();
                    await refreshAssetDrawerList();
                    await renderHomeFavorites(false);
                    bindDrawerFileMeta();
                } else {
                    assetDrawerAuthed = false;
                    if (msg) msg.textContent = '❌ 인증코드가 올바르지 않습니다';
                }
            } catch (e) {
                assetDrawerAuthed = false;
                if (msg) msg.textContent = `❌ 인증 실패: ${e}`;
            }
        }

        function formatSizeHuman(n) {
            if (!n) return '0 KB';
            if (n >= 1024 * 1024) return (n / 1024 / 1024).toFixed(2) + ' MB';
            return (n / 1024).toFixed(1) + ' KB';
        }
        function toAssetStem(v) {
            const s = (v || '').toLowerCase();
            const file = s.split('/').pop() || s;
            return file.replace(/\.[^.]+$/, '');
