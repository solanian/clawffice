services:
  clawffice:
    build:
      context: .
      dockerfile: Dockerfile
    image: clawffice:latest
    container_name: clawffice
    restart: unless-stopped
    network_mode: host
    environment:
      CLAWFFICE_BACKEND_PORT: "19000"
      PYTHONPATH: "/app/backend"
      CLAWFFICE_ENV: "${CLAWFFICE_ENV:-production}"
      CLAWFFICE_DATA_DIR: "/data"
      CHAT_DB_FILE: "/data/chat.db"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-900}"
      FLASK_SECRET_KEY: "${FLASK_SECRET_KEY:?set FLASK_SECRET_KEY in .env or Portainer stack variables}"
      ASSET_DRAWER_PASS: "${ASSET_DRAWER_PASS:?set ASSET_DRAWER_PASS in .env or Portainer stack variables}"
      OPENCLAW_WORKSPACE: "/app"
      OPENCLAW_HOME: "/home/opc"
      OPENCLAW_CLI: "${OPENCLAW_CLI:-/home/opc/.npm-global/bin/openclaw}"
      OPENCLAW_CHAT_AGENT: "${OPENCLAW_CHAT_AGENT:-clawffice manager}"
      OPENCLAW_CHAT_TIMEOUT: "${OPENCLAW_CHAT_TIMEOUT:-1800}"
      OPENCLAW_CHAT_SEND_TIMEOUT: "${OPENCLAW_CHAT_SEND_TIMEOUT:-120}"
      HOME: "/home/opc"
      PATH: "/home/opc/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      LD_LIBRARY_PATH: "/openclaw-node-libs"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-nanobanana-pro}"
    volumes:
      - /home/opc/workspace/clawffice:/app
      - /home/opc/workspace/clawffice:/home/opc/workspace/clawffice
      - /home/opc/workspace/clawffice/memory:/memory
      - /home/opc/.openclaw:/home/opc/.openclaw
      - /home/opc/.npm-global:/home/opc/.npm-global:ro
      - /usr/bin/node:/usr/bin/node:ro
      - /home/opc/workspace/clawffice/.runtime/openclaw-node-libs:/openclaw-node-libs:ro
      - clawffice-data:/data

  clawffice-agent-push:
    image: clawffice:latest
    container_name: clawffice-agent-push
    restart: unless-stopped
    network_mode: host
    depends_on:
      - clawffice
    command: ["python", "-u", "office-agent-push.py"]
    healthcheck:
      disable: true
    environment:
      OFFICE_JOIN_KEY: "${OFFICE_JOIN_KEY:-ocj_example_team_01}"
      OFFICE_AGENT_ID: "${OFFICE_AGENT_ID:-star}"
      OFFICE_AGENT_NAME: "${OFFICE_AGENT_NAME:-Star}"
      OFFICE_OPENCLAW_AGENT_ID: "${OFFICE_OPENCLAW_AGENT_ID:-clawffice manager}"
      OFFICE_URL: "http://127.0.0.1:19000"
      OFFICE_LOCAL_STATE_FILE: "/app/state.json"
      OFFICE_STALE_STATE_TTL: "${OFFICE_STALE_STATE_TTL:-600}"
      PYTHONPATH: "/app/backend"
    volumes:
      - /home/opc/workspace/clawffice:/app

volumes:
  clawffice-data:
